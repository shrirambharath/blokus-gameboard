<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Blokus</title>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
	<header>
		<div class="brand">
			<span class="logo" aria-hidden="true"></span>
			<h1>Blokus</h1>
		</div>
		<div id="status" class="status">Connecting…</div>
		<button id="new-game" class="btn btn-primary">New game</button>
	</header>

	<div id="toast" class="toast hidden"></div>
	<div id="scoreboard" class="scoreboard hidden"></div>

	<main id="layout">
		<section class="seat-card" id="card-blue"></section>
		<section class="seat-card" id="card-red"></section>

		<div id="board-area">
			<div id="board"></div>
		</div>

		<section class="seat-card" id="card-green"></section>
		<section class="seat-card" id="card-yellow"></section>
	</main>

	<footer id="control-bar">
		<div id="preview-box">
			<div id="preview"></div>
		</div>
		<div id="control-actions">
			<button id="rot-ccw" class="btn" disabled title="Rotate left">⟲</button>
			<button id="rot-cw" class="btn" disabled title="Rotate right">⟳</button>
			<button id="flip" class="btn" disabled title="Flip / mirror">⇄</button>
			<button id="confirm" class="btn btn-confirm hidden">Confirm ✓</button>
			<button id="cancel" class="btn btn-cancel hidden">Cancel</button>
			<button id="clear" class="btn" disabled>Clear</button>
		</div>
		<div id="hint" class="hint"></div>
	</footer>

	<div id="lobby" class="overlay hidden">
		<div class="overlay-card lobby-card">
			<h2>Game lobby</h2>
			<div class="lobby-sub">Pick a color. Anyone can start — empty seats become bots.</div>
			<label class="name-field">Your name
				<input id="name-input" maxlength="14" placeholder="Player" autocomplete="off">
			</label>
			<div id="lobby-seats"></div>
			<button id="start-game" class="btn btn-primary">Start game</button>
		</div>
	</div>

	<div id="gameover" class="overlay hidden">
		<div class="overlay-card">
			<div class="go-trophy">🏆</div>
			<h2 id="go-title">Game over</h2>
			<div id="go-sub" class="go-sub"></div>
			<div id="go-standings"></div>
			<button id="go-newgame" class="btn btn-primary">Play again</button>
		</div>
	</div>

	<script src="/static/app.js"></script>
</body>
</html>
